name: Build MATLAB Results Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: matlab-results-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3

      - name: Decide run mode
        id: mode
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "run_nominal=true" >> "$GITHUB_OUTPUT"
            echo "run_adaptive=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-nom$ ]]; then
            echo "run_nominal=true" >> "$GITHUB_OUTPUT"
            echo "run_adaptive=false" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-adapt$ ]]; then
            echo "run_nominal=false" >> "$GITHUB_OUTPUT"
            echo "run_adaptive=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported tag: $TAG"
            echo "Use vX.X.X, vX.X.X-nom, or vX.X.X-adapt"
            exit 1
          fi

      - name: Run nominal release simulation
        if: steps.mode.outputs.run_nominal == 'true'
        uses: matlab-actions/run-command@v3
        with:
          command: "set(0,'DefaultFigureVisible','off'); run('run/ci_nominal_release.m');"

      - name: Run adaptive release simulation
        if: steps.mode.outputs.run_adaptive == 'true'
        uses: matlab-actions/run-command@v3
        with:
          command: "set(0,'DefaultFigureVisible','off'); run('run/ci_adaptive_release.m');"

      - name: Verify results folder
        run: |
          test -d results
          find results -type f | head

      - name: Package results
        run: |
          zip -r "results-${GITHUB_REF_NAME}.zip" results

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.ref_name }}
          path: results-${{ github.ref_name }}.zip

      - name: Create GitHub release and upload results
        uses: softprops/action-gh-release@v2
        with:
          files: results-${{ github.ref_name }}.zip
          generate_release_notes: true